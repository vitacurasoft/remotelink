<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; connect-src *; media-src *" />
  <title>RemoteLink</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #status {
      font-size: 0.9rem;
      color: #888;
      min-height: 1.2em;
    }

    #status.connected { color: #4caf50; }
    #status.error     { color: #f44336; }

    video#screen {
      display: none;
      width: 100%;
      height: calc(100vh - 120px);
      object-fit: contain;
      background: #000;
    }

    video#screen.active { display: block; }

    #btn-connect {
      padding: 14px 48px;
      font-size: 1.1rem;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btn-connect:hover   { background: #1565c0; }
    #btn-connect:disabled { background: #444; cursor: default; }
  </style>
</head>
<body>
  <h1>RemoteLink</h1>
  <p id="status">Prêt</p>
  <video id="screen" autoplay playsinline></video>
  <button id="btn-connect">Connecter</button>

  <script src="renderer.js"></script>
</body>
</html>
