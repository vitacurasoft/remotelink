<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' file:; script-src 'self' file:; connect-src *; media-src *" />
  <title>RemoteLink</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      overflow: hidden;
    }

    /* Vue de connexion */
    #connect-view { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #status {
      font-size: 0.9rem;
      color: #888;
      min-height: 1.2em;
    }
    #status.connected { color: #4caf50; }
    #status.error     { color: #f44336; }

    #btn-connect {
      padding: 14px 48px;
      font-size: 1.1rem;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-connect:hover    { background: #1565c0; }
    #btn-connect:disabled { background: #333; cursor: default; color: #666; }

    /* Vue streaming */
    #stream-view {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #stream-view.active { display: block; }

    video#screen {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
      cursor: none;   /* cache le curseur local sur la vidéo */
      outline: none;
    }

    /* HUD stats */
    #hud {
      position: absolute;
      top: 10px;
      right: 12px;
      background: rgba(0,0,0,0.55);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      user-select: none;
    }

    /* Indicateur de reconnexion */
    #reconnect-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: #f44336;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 1rem;
      display: none;
    }
    #reconnect-badge.visible { display: block; }
  </style>
</head>
<body>

  <!-- Écran de connexion -->
  <div id="connect-view">
    <h1>RemoteLink</h1>
    <p id="status">Prêt</p>
    <button id="btn-connect">Connecter</button>
  </div>

  <!-- Écran de streaming -->
  <div id="stream-view">
    <video id="screen" autoplay playsinline tabindex="0"></video>
    <div id="hud">-- fps</div>
    <div id="reconnect-badge">Reconnexion...</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
