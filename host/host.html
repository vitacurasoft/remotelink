<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; connect-src *; media-src *"/>
  <title>RemoteLink Host</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      user-select: none;
    }
    #indicator {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #333;
      transition: background 0.4s, box-shadow 0.4s;
    }
    #indicator.active {
      background: #4caf50;
      box-shadow: 0 0 10px #4caf5088;
    }
    h2 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    #status {
      font-size: 0.82rem;
      color: #666;
      text-align: center;
      padding: 0 24px;
      min-height: 1.2em;
    }
    #status.connected { color: #4caf50; }
    #status.error     { color: #f44336; }
  </style>
</head>
<body>
  <div id="indicator"></div>
  <h2>RemoteLink</h2>
  <p id="status">Démarrage...</p>
  <script src="host-renderer.js"></script>
</body>
</html>
